<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Admin - Pátio Santa Maria</title>
    <style>
        body { font-family: sans-serif; padding: 20px; background: #2c3e50; color: white; }
        .box { background: white; color: #333; padding: 20px; border-radius: 10px; max-width: 400px; margin: auto; }
        h2 { text-align: center; color: #2c3e50; }
        .turno-admin { padding: 12px; margin: 5px 0; border-radius: 5px; cursor: pointer; text-align: center; font-weight: bold; border: 1px solid #ccc; }
        .ocupado { background: #e74c3c; color: white; border-color: #c0392b; }
        .disponivel { background: #f9f9f9; color: #2ecc71; }
        select, input { width: 100%; padding: 10px; margin: 10px 0; border-radius: 5px; box-sizing: border-box; }
    </style>
</head>
<body>
    <div class="box">
        <h2>Painel Admin</h2>
        <label>Data:</label>
        <input type="date" id="dA" onchange="ver()">
        <label>Quadra:</label>
        <select id="qA" onchange="ver()">
            <option value="voley1">Vôlei 1</option>
            <option value="voley2">Vôlei 2</option>
            <option value="voley3">Vôlei 3</option>
            <option value="voley4">Vôlei 4</option>
            <option value="futbol">Futebol</option>
        </select>
        <hr>
        <div id="lista"></div>
    </div>
    <script>
        const DB_URL = "https://patio-santa-maria-a0eb5-default-rtdb.firebaseio.com/reservas"; 

        async function ver() {
            const d = document.getElementById('dA').value;
            const q = document.getElementById('qA').value;
            const res = await fetch(`${DB_URL}/${d}/${q}.json`);
            const data = await res.json() || {};
            const lista = document.getElementById('lista');
            lista.innerHTML = '';
            for (let h = 10; h < 22; h++) {
                const id = h + ":00";
                const pago = data[id] === "confirmado";
                const div = document.createElement('div');
                div.className = 'turno-admin ' + (pago ? 'ocupado' : 'disponivel');
                div.innerText = id + (pago ? " - PAGO" : " - DISPONÍVEL");
                div.onclick = async () => {
                    await fetch(`${DB_URL}/${d}/${q}/${id}.json`, {
                        method: 'PUT',
                        body: JSON.stringify(pago ? null : "confirmado")
                    });
                    ver();
                };
                lista.appendChild(div);
            }
        }
        document.getElementById('dA').value = new Date().toISOString().split('T')[0];
        ver();
    </script>
</body>
</html>
