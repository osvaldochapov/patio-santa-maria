<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pátio Santa Maria - Reservas</title>
    <style>
        :root { --disponivel: #2ecc71; --provisorio: #f1c40f; --ocupado: #e74c3c; --dark: #2c3e50; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; padding: 15px; background: #f4f7f6; color: var(--dark); }
        .container { max-width: 500px; margin: auto; background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        h1 { text-align: center; margin-bottom: 5px; color: var(--dark); }
        .subtitle { text-align: center; font-size: 0.85em; color: #7f8c8d; margin-bottom: 20px; }
        label { font-weight: bold; font-size: 0.9em; display: block; margin-top: 10px; }
        select, input { width: 100%; padding: 12px; margin: 5px 0 15px; border-radius: 8px; border: 1px solid #ccc; font-size: 16px; box-sizing: border-box; }
        .grid-turnos { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 10px; }
        .turno { padding: 15px; text-align: center; border-radius: 8px; background: var(--disponivel); color: white; font-weight: bold; cursor: pointer; transition: 0.2s; border: 2px solid transparent; }
        .turno.provisorio { background: var(--provisorio); color: var(--dark); border-color: #d4ac0d; }
        .turno.ocupado { background: var(--ocupado); cursor: not-allowed; opacity: 1; }
        .btn-whatsapp { display: block; width: 100%; padding: 15px; margin-top: 25px; background: #25d366; color: white; text-align: center; text-decoration: none; font-weight: bold; border-radius: 8px; box-sizing: border-box; box-shadow: 0 4px 10px rgba(37,211,102,0.3); }
        .loading { text-align: center; grid-column: span 2; padding: 20px; color: #7f8c8d; }
    </style>
</head>
<body>

<div class="container">
    <h1>Pátio Santa Maria</h1>
    <p class="subtitle">Itapoá, SC - Agendamento Online</p>

    <label>1. Selecione a Quadra:</label>
    <select id="quadra" onchange="carregarReservas()">
        <option value="voley1">Vôlei 1</option>
        <option value="voley2">Vôlei 2</option>
        <option value="futbol">Futebol</option>
    </select>

    <label>2. Selecione a Data:</label>
    <input type="date" id="data" onchange="carregarReservas()">

    <div id="contenedorTurnos" class
